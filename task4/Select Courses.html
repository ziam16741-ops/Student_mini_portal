<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-graduation-cap me-2"></i>Student Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Course Selection Form -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-lg border-0" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.95);">
                        <div class="card-header bg-primary text-white text-center py-4">
                            <i class="fas fa-book fa-2x mb-2"></i>
                            <h2 class="mb-0 fw-bold">Course Selection</h2>
                            <p class="mb-0 mt-2">Choose your courses</p>
                        </div>
                        <div class="card-body p-5">
                            <form id="courseForm">
                                <!-- Cyber Security -->
                                <div class="mb-4 p-4 border rounded shadow-sm">
                                    <div class="d-flex align-items-center">
                                        <div class="form-check me-4">
                                            <input class="form-check-input" type="checkbox" id="cyber" value="Cyber Security">
                                            <label class="form-check-label fw-bold fs-5" for="cyber"></label>
                                        </div>
                                        <div>
                                            <i class="fas fa-shield-alt fa-2x text-danger me-3"></i>
                                            <h4 class="d-inline fw-bold mb-0">Cyber Security</h4>
                                        </div>
                                    </div>
                                </div>

                                <!-- Web Engineering -->
                                <div class="mb-4 p-4 border rounded shadow-sm">
                                    <div class="d-flex align-items-center">
                                        <div class="form-check me-4">
                                            <input class="form-check-input" type="checkbox" id="webEng" value="Web Engineering">
                                            <label class="form-check-label fw-bold fs-5" for="webEng"></label>
                                        </div>
                                        <div>
                                            <i class="fas fa-globe fa-2x text-primary me-3"></i>
                                            <h4 class="d-inline fw-bold mb-0">Web Engineering</h4>
                                        </div>
                                    </div>
                                </div>

                                <!-- Blockchain -->
                                <div class="mb-5 p-4 border rounded shadow-sm">
                                    <div class="d-flex align-items-center">
                                        <div class="form-check me-4">
                                            <input class="form-check-input" type="checkbox" id="blockchain" value="Blockchain">
                                            <label class="form-check-label fw-bold fs-5" for="blockchain"></label>
                                        </div>
                                        <div>
                                            <i class="fas fa-link fa-2x text-success me-3"></i>
                                            <h4 class="d-inline fw-bold mb-0">Blockchain</h4>
                                        </div>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <div class="text-center">
                                    <button type="submit" class="btn btn-success btn-lg btn-hover w-100 fw-bold fs-4 py-3">
                                        <i class="fas fa-paper-plane me-2"></i>Submit Courses
                                    </button>
                                </div>
                            </form>

                            <!-- Back to Dashboard -->
                            <div class="text-center mt-4">
                                <a href="dashboard.html" class="btn btn-outline-primary btn-lg w-100 fw-bold">
                                    ← Back to Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get all checkboxes
        document.getElementById('courseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // ✅ DOM: Get checked checkboxes
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            const selectedCourses = Array.from(checkboxes).map(cb => cb.value);
            
            // ✅ Check if any course selected
            if (selectedCourses.length === 0) {
                alert('⚠️ Please select at least one course!');
                return;
            }
            
            // ✅ Show selected courses in alert
            const message = `✅ Selected Courses:\n\n${selectedCourses.join('\n')}\n\nTotal: ${selectedCourses.length} course(s)`;
            alert(message);
        });
    </script>
</body>
</html>
