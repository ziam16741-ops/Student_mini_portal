<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-graduation-cap me-2"></i>Student Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Feedback Form -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow-lg border-0" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.95);">
                        <div class="card-header bg-primary text-white text-center py-4">
                            <i class="fas fa-comments fa-2x mb-2"></i>
                            <h3 class="mb-0 fw-bold">Feedback</h3>
                            <p class="mb-0 mt-2 opacity-75">Share your thoughts</p>
                        </div>
                        <div class="card-body p-5">
                            <form id="feedbackForm">
                                <!-- Name Field -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold fs-5">Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control form-control-lg" id="name" placeholder="Enter your name" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Rating Dropdown -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold fs-5">Rating <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-lg" id="rating" required>
                                        <option value="">Select Rating</option>
                                        <option value="5">⭐⭐⭐⭐⭐ (5 - Excellent)</option>
                                        <option value="4">⭐⭐⭐⭐ (4 - Very Good)</option>
                                        <option value="3">⭐⭐⭐ (3 - Good)</option>
                                        <option value="2">⭐⭐ (2 - Fair)</option>
                                        <option value="1">⭐ (1 - Poor)</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Comments Field -->
                                <div class="mb-5">
                                    <label class="form-label fw-bold fs-5">Comments <span class="text-danger">*</span></label>
                                    <textarea class="form-control" id="comments" rows="5" placeholder="Share your feedback..." required></textarea>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Submit Button -->
                                <div class="text-center mb-4">
                                    <button type="submit" class="btn btn-primary btn-lg btn-hover w-100 fw-bold fs-4 py-3">
                                        <i class="fas fa-paper-plane me-2"></i>Submit Feedback
                                    </button>
                                </div>
                            </form>

                            <!-- Back to Dashboard -->
                            <div class="text-center">
                                <a href="dashboard.html" class="btn btn-outline-primary btn-lg w-100 fw-bold py-3">
                                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Form validation & submission
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            clearValidation();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const rating = document.getElementById('rating').value;
            const comments = document.getElementById('comments').value.trim();
            
            let isValid = true;
            
            // ✅ PRESENCE CHECK VALIDATION
            if (!name) {
                showError('name', 'Name is required');
                isValid = false;
            }
            
            if (!rating) {
                showError('rating', 'Please select a rating');
                isValid = false;
            }
            
            if (!comments) {
                showError('comments', 'Comments are required');
                isValid = false;
            }
            
            if (isValid) {
                // ✅ SUCCESS MESSAGE
                const studentName = localStorage.getItem('studentName') || name;
                alert(`✅ Thank you ${studentName}!\n\nYour feedback has been submitted successfully!\n\nRating: ${rating}/5\nComments: ${comments.substring(0, 50)}...`);
                
                // Reset form
                document.getElementById('feedbackForm').reset();
            }
        });
        
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.add('is-invalid');
            const feedback = field.parentNode.querySelector('.invalid-feedback');
            if (feedback) feedback.textContent = message;
            field.focus();
        }
        
        function clearValidation() {
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
        }
    </script>
</body>
</html>
