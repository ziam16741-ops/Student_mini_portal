<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            pointer-events: none;
        }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .glass-card { 
            backdrop-filter: blur(20px); 
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .profile-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }
        .time-badge {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeInUp { animation: fadeInUp 0.8s ease-out; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>Student Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="courses.html">
                            <i class="fas fa-book me-1"></i>Courses
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="dashboard.html">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="feedback.html">
                            <i class="fas fa-comments me-1"></i>Feedback
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Enhanced Dashboard -->
    <section class="hero-section d-flex align-items-center position-relative">
        <div class="container position-relative z-index-1">
            <div class="row justify-content-center">
                <div class="col-xl-10 col-lg-11">
                    <!-- Main Dashboard Card -->
                    <div class="card shadow-xl border-0 glass-card animate-fadeInUp">
                        <div class="card-header bg-gradient text-white text-center py-5 position-relative overflow-hidden">
                            <div class="position-absolute top-0 start-50 translate-middle-x mt-n3">
                                <div class="bg-white bg-opacity-20 p-3 rounded-circle shadow-lg">
                                    <i class="fas fa-tachometer-alt fa-2x text-white"></i>
                                </div>
                            </div>
                            <h1 class="display-4 fw-bold mb-2">Dashboard</h1>
                            <p class="lead opacity-90 mb-0">Your personalized student portal</p>
                        </div>
                        
                        <div class="card-body p-5">
                            <!-- Live Date Time (Top Small) -->
                            <div class="row mb-5">
                                <div class="col-md-6 mx-auto">
                                    <div class="time-badge text-center p-4 shadow-lg">
                                        <i class="fas fa-clock fa-2x text-primary mb-2"></i>
                                        <div id="liveDateTime" class="h4 fw-bold text-primary mb-1"></div>
                                        <small class="text-muted">Live Date & Time</small>
                                    </div>
                                </div>
                            </div>

                            <!-- Student Profile Section -->
                            <div class="text-center mb-5 animate-fadeInUp">
                                <div class="mb-4">
                                    <i class="fas fa-user-circle fa-5x text-primary mb-3"></i>
                                </div>
                                <div class="profile-badge mx-auto mb-4 animate-fadeInUp" style="max-width: 400px;">
                                    <i class="fas fa-user-graduate me-3"></i>
                                    <span id="studentNameDisplay">Loading student...</span>
                                </div>
                                <h3 class="text-primary fw-bold animate-fadeInUp">
                                    Welcome Back! 👋
                                </h3>
                                <p class="lead text-muted mt-2 animate-fadeInUp">
                                    Ready to continue your learning journey
                                </p>
                            </div>

                            <!-- Quick Action Buttons -->
                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <a href="courses.html" class="btn btn-success btn-lg btn-hover w-100 py-4 fs-4 fw-bold shadow-lg">
                                        <i class="fas fa-book fa-2x mb-2 d-block"></i>
                                        <span>Go to Courses</span>
                                    </a>
                                </div>
                                <div class="col-md-6">
                                    <a href="feedback.html" class="btn btn-info btn-lg btn-hover w-100 py-4 fs-4 fw-bold shadow-lg">
                                        <i class="fas fa-comments fa-2x mb-2 d-block"></i>
                                        <span>Give Feedback</span>
                                    </a>
                                </div>
                            </div>

                            <!-- Stats Cards -->
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <div class="card border-0 shadow-lg h-100 glass-card text-center p-4">
                                        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                                        <h4 class="fw-bold text-primary">Active</h4>
                                        <p class="text-muted mb-0">Student Status</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card border-0 shadow-lg h-100 glass-card text-center p-4">
                                        <i class="fas fa-calendar-check fa-3x text-warning mb-3"></i>
                                        <h4 class="fw-bold text-primary">Upcoming</h4>
                                        <p class="text-muted mb-0">Assignments</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="card border-0 shadow-lg h-100 glass-card text-center p-4">
                                        <i class="fas fa-chart-line fa-3x text-info mb-3"></i>
                                        <h4 class="fw-bold text-primary">100%</h4>
                                        <p class="text-muted mb-0">Progress</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Enhanced Dashboard Logic
        window.onload = function() {
            loadStudentProfile();
            startLiveClock();
        };

        // Load student profile from localStorage
        function loadStudentProfile() {
            const studentName = localStorage.getItem('studentName') || 'Student';
            const studentEmail = localStorage.getItem('studentEmail') || 'student@example.com';
            
            document.getElementById('studentNameDisplay').textContent = studentName;
        }

        // Live updating clock (top small)
        function startLiveClock() {
            function updateClock() {
                const now = new Date();
                const options = {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                };
                document.getElementById('liveDateTime').textContent = now.toLocaleDateString('en-US', options);
            }
            updateClock();
            setInterval(updateClock, 1000);
        }

        // Manual refresh button (kept for demo)
        function updateDateTime() {
            const now = new Date();
            alert(`🔄 Refreshed!\nCurrent Time: ${now.toLocaleString()}`);
        }
    </script>
</body>
</html>
