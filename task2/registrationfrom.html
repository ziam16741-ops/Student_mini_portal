<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .btn-hover { transition: all 0.3s ease; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>Student Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="registration.html">Registration</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card shadow-lg border-0" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.95);">
                        <div class="card-header bg-primary text-white text-center py-4">
                            <i class="fas fa-user-plus fa-2x mb-2"></i>
                            <h3 class="mb-0 fw-bold">Student Registration</h3>
                        </div>
                        <div class="card-body p-4">
                            <form id="registrationForm">
                                <!-- Name -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                    <input type="email" class="form-control" id="email" placeholder="example@domain.com" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Password <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Confirm Password -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Confirm Password <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Age -->
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Age <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="age" placeholder="Enter your age" min="1" max="100" required>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <!-- Gender -->
                                <div class="mb-4">
                                    <label class="form-label fw-bold">Gender <span class="text-danger">*</span></label>
                                    <div class="d-flex gap-3">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                                            <label class="form-check-label fw-semibold" for="male">Male</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="gender" id="female" value="Female" required>
                                            <label class="form-check-label fw-semibold" for="female">Female</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="gender" id="other" value="Other" required>
                                            <label class="form-check-label fw-semibold" for="other">Other</label>
                                        </div>
                                    </div>
                                    <div class="invalid-feedback d-block" id="genderError"></div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg btn-hover w-100 fw-bold">
                                    <i class="fas fa-sign-in-alt me-2"></i>Register & Go to Dashboard
                                </button>
                            </form>
                            <div class="text-center mt-3">
                                <a href="index.html" class="text-decoration-none">← Back to Home</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset previous validation
            clearValidation();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const age = document.getElementById('age').value;
            const gender = document.querySelector('input[name="gender"]:checked');
            
            let isValid = true;
            
            // 1. PRESENCE CHECK (No empty fields)
            if (!name) { showError('name', 'Name is required'); isValid = false; }
            if (!email) { showError('email', 'Email is required'); isValid = false; }
            if (!password) { showError('password', 'Password is required'); isValid = false; }
            if (!confirmPassword) { showError('confirmPassword', 'Confirm password is required'); isValid = false; }
            if (!age) { showError('age', 'Age is required'); isValid = false; }
            if (!gender) { showErrorGender('Please select gender'); isValid = false; }
            
            // 2. EMAIL FORMAT VALIDATION
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('email', 'Invalid email format'); 
                isValid = false;
            }
            
            // 3. PASSWORD MATCH VALIDATION
            if (password && confirmPassword && password !== confirmPassword) {
                showError('confirmPassword', 'Passwords do not match'); 
                isValid = false;
            }
            
            // 4. AGE NUMERIC TYPE CHECK
            if (age && (isNaN(age) || age <= 0 || age > 100)) {
                showError('age', 'Age must be valid number (1-100)'); 
                isValid = false;
            }
            
            if (isValid) {
                // Store student data
                localStorage.setItem('studentName', name);
                localStorage.setItem('studentEmail', email);
                
                // Success - Redirect to Dashboard
                alert(`✅ Registration Successful!\n\nWelcome ${name}!\nRedirecting to Dashboard...`);
                window.location.href = 'dashboard.html';
            }
        });
        
        function showError(fieldId, message) {
            const field = document.getElementById(fieldId);
            field.classList.add('is-invalid');
            const feedback = field.parentNode.querySelector('.invalid-feedback') || field.parentNode.parentNode.querySelector('.invalid-feedback');
            if (feedback) feedback.textContent = message;
        }
        
        function showErrorGender(message) {
            document.getElementById('genderError').textContent = message;
            document.getElementById('genderError').style.color = '#dc3545';
        }
        
        function clearValidation() {
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
            document.getElementById('genderError').textContent = '';
        }
    </script>
</body>
</html>
